<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; padding: 1rem; }
    </style>
</head>
<body class="bg-[#0f0f1a] text-white p-4">
    <h1 class="text-2xl font-bold text-[#e8a020] mb-4">StreamVault Pro</h1>
    
    <div class="flex gap-2 mb-6">
        <button onclick="cargarLista('canales.m3u')" class="bg-green-700 p-2 rounded text-sm font-bold">📺 TV en Vivo</button>
        <button onclick="cargarLista('listado.m3u')" class="bg-blue-700 p-2 rounded text-sm font-bold">🎬 Mis Pelis</button>
    </div>

    <input type="text" oninput="buscarTMDB(this.value)" 
           placeholder="🔍 Buscar en TMDB..." 
           class="w-full p-3 bg-[#181822] border border-[#2a2a3a] rounded mb-6">

    <div id="loader" class="hidden text-[#e8a020] mb-4">Cargando...</div>
    <div id="container" class="grid-container"></div>

    <script src="app.js"></script>
</body>
</html>
