<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📺 StreamVault Pro</h1>
        <button id="cargarLista">Cargar Lista</button>
    </header>

    <div class="container">
        <aside id="listaCanales">
            <h3>Canales</h3>
            <div id="contenedorCanales"></div>
        </aside>

        <main id="reproductor">
            <div class="video-container">
                <video id="player" controls autoplay></video>
                <p>Selecciona un canal para reproducir</p>
            </div>
        </main>
    </div>

    <script src="Canales.js"></script>
    <script src="app.js"></script>
</body>
</html>
