<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StreamVault Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f0f1a] text-white">
    <div class="p-4">
        <h1 class="text-2xl font-bold text-[#e8a020] mb-4">StreamVault Pro</h1>
        
        <div class="flex gap-2 mb-4">
            <button onclick="cargarLista('tv/canales.m3u')" class="bg-green-700 px-4 py-2 rounded">📺 Cargar TV</button>
            <button onclick="cargarLista('peliculas/listado.m3u')" class="bg-blue-700 px-4 py-2 rounded">🎬 Mis Pelis</button>
        </div>

        <input type="text" id="buscador" oninput="buscarTMDB(this.value)" 
               placeholder="🔍 Buscar estrenos nuevos..." 
               class="w-full p-2 bg-[#181822] border border-[#2a2a3a] rounded mb-4">

        <div id="loader" class="hidden text-[#e8a020]">Cargando...</div>
        <div id="container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </div>
    <script src="app.js"></script>
</body>
  </html>
